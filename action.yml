name: "ECR Build and Push"
description: "Builds and pushes Docker images to Amazon ECR"
author: "delivops"
branding:
  icon: "package"
  color: "blue"

inputs:
  image_name:
    description: "Name of the Docker image to build and push"
    required: true
  tag:
    description: "One or more tags to apply to the Docker image, separated by comma"
    required: true
  path:
    description: "Path to the Dockerfile context"
    required: false
    default: "."
  build_args:
    description: "Comma-separated list of build arguments to pass to the Docker build"
    required: false
    default: ""
  push:
    description: "Whether to push the Docker image to ECR"
    required: false
    default: "true"
  force_ecr_login:
    description: "Whether to force a new login to ECR"
    required: false
    default: "false"
  docker_layer_cache:
    description: "Whether to use docker caching"
    required: false
    default: "true"
  enable_buildcache:
    description: "Enable using an ECR registry build cache"
    required: false
    default: "false"
  buildcache_tag_name:
    description: "Tag to use when storing build cache layers"
    required: false
    default: "buildcache"
  target:
    description: "Sets the target stage to build"
    required: false
    default: ""
  dockerfile_path:
    description: "Path to the Dockerfile"
    required: false
    default: "Dockerfile"
  platforms:
    description: "List of target platforms for build"
    required: false
    default: "linux/amd64"
  aws_account_id:
    description: "The AWS account ID"
    required: true
  aws_region:
    description: "The AWS region"
    required: true
  aws_role:
    description: "The AWS IAM role to assume"
    default: "github_services"
    required: false
  pull:
    description: "Always attempt to pull referenced images to avoid stale bases"
    required: false
    default: "true"
  no_cache:
    description: "Do not use cache when building the image"
    required: false
    default: "false"
  dockerhub_username:
    description: "DockerHub username for pulling base images"
    required: false
    default: ""
  dockerhub_access_token:
    description: "DockerHub access token for pulling base images"
    required: false
    default: ""
  scan_on_push:
    description: "Enable vulnerability scanning enforcement after image push"
    required: false
    default: "false"
  scan_severity_threshold:
    description: "Fail build if vulnerabilities at or above this severity are found (CRITICAL, HIGH, MEDIUM, LOW, INFORMATIONAL)"
    required: false
    default: "CRITICAL"
  scan_timeout:
    description: "Maximum time in seconds to wait for scan results"
    required: false
    default: "300"
  scan_fail_on_timeout:
    description: "Whether to fail the action if scan times out"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      if: ${{ inputs.push == 'true' || inputs.force_ecr_login == 'true' || inputs.enable_buildcache == 'true' }}
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: "arn:aws:iam::${{ inputs.aws_account_id }}:role/${{ inputs.aws_role}}"
        aws-region: ${{ inputs.aws_region }}

    - name: Login to Amazon ECR
      if: ${{ inputs.push == 'true' || inputs.force_ecr_login == 'true' || inputs.enable_buildcache == 'true' }}
      id: login_ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Login to DockerHub
      if: ${{ inputs.dockerhub_username != '' && inputs.dockerhub_access_token != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_access_token }}

    - name: Prepare tags
      id: prepare_tags
      shell: bash
      run: |
        TAGS="${{ inputs.tag }}"
        REGISTRY="${{ steps.login_ecr.outputs.registry || 'local' }}"
        PREFIX="${REGISTRY}/${{ inputs.image_name }}:"
        IFS=',' read -ra ADDR <<< "$TAGS"
        IMAGES=""
        for i in "${ADDR[@]}"; do
          i_trimmed="$(echo "$i" | xargs)"
          if [ -z "$IMAGES" ]; then
            IMAGES="${PREFIX}${i_trimmed}"
          else
            IMAGES="${IMAGES},${PREFIX}${i_trimmed}"
          fi
        done
        echo "tags=$IMAGES" >> "$GITHUB_OUTPUT"

    - name: Ensure ECR repository exists
      if: ${{ inputs.push == 'true' || inputs.enable_buildcache == 'true' }}
      shell: bash
      run: |
        set -e
        REPO="${{ inputs.image_name }}"
        aws ecr describe-repositories --repository-names "$REPO" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$REPO" >/dev/null

    - name: Set up QEMU
      if: contains(inputs.platforms, 'arm64') || contains(inputs.platforms, '386') || contains(inputs.platforms, 'arm/') || contains(inputs.platforms, 'ppc64le') || contains(inputs.platforms, 's390x')
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Prepare cache configuration
      id: prepare_cache
      shell: bash
      run: |
        set -euo pipefail

        cache_from=""
        cache_to=""

        if [ "${{ inputs.docker_layer_cache }}" = "true" ]; then
          cache_from="type=gha"
          cache_to="type=gha,mode=max"
        fi

        if [ "${{ inputs.enable_buildcache }}" = "true" ]; then
          registry="${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com"
          cache_from_registry="type=registry,ref=${registry}/${{ inputs.image_name }}:${{ inputs.buildcache_tag_name }}"
          cache_to_registry="type=registry,ref=${registry}/${{ inputs.image_name }}:${{ inputs.buildcache_tag_name }},mode=max"

          if [ -n "$cache_from" ]; then
            cache_from="${cache_from}"$'\n'"${cache_from_registry}"
          else
            cache_from="$cache_from_registry"
          fi

          if [ -n "$cache_to" ]; then
            cache_to="${cache_to}"$'\n'"${cache_to_registry}"
          else
            cache_to="$cache_to_registry"
          fi
        fi

        printf 'cache_from<<EOF\n%s\nEOF\n' "$cache_from" >> "$GITHUB_OUTPUT"
        printf 'cache_to<<EOF\n%s\nEOF\n' "$cache_to" >> "$GITHUB_OUTPUT"

    - name: Build (and optionally push) Docker image
      uses: docker/build-push-action@v6.19.2
      with:
        context: ${{ inputs.path }}
        target: ${{ inputs.target }}
        push: ${{ inputs.push }}
        pull: ${{ inputs.pull }}
        no-cache: ${{ inputs.no_cache }}
        tags: ${{ steps.prepare_tags.outputs.tags }}
        build-args: ${{ inputs.build_args }}
        file: ${{ inputs.dockerfile_path }}
        platforms: ${{ inputs.platforms }}
        cache-from: ${{ steps.prepare_cache.outputs.cache_from }}
        cache-to: ${{ steps.prepare_cache.outputs.cache_to }}
        provenance: false

    - name: Check vulnerability scan results
      if: ${{ inputs.scan_on_push == 'true' && inputs.push == 'true' }}
      shell: bash
      env:
        INPUT_IMAGE_NAME: ${{ inputs.image_name }}
        INPUT_REGION: ${{ inputs.aws_region }}
        INPUT_THRESHOLD: ${{ inputs.scan_severity_threshold }}
        INPUT_TIMEOUT: ${{ inputs.scan_timeout }}
        INPUT_FAIL_ON_TIMEOUT: ${{ inputs.scan_fail_on_timeout }}
        INPUT_TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail

        REPO_NAME="$INPUT_IMAGE_NAME"
        REGION="$INPUT_REGION"
        THRESHOLD="$INPUT_THRESHOLD"
        TIMEOUT="$INPUT_TIMEOUT"
        FAIL_ON_TIMEOUT="$INPUT_FAIL_ON_TIMEOUT"

        # Parse first tag from comma-separated list
        PRIMARY_TAG=$(echo "$INPUT_TAG" | cut -d',' -f1 | xargs)

        echo "::group::Vulnerability Scan Configuration"
        echo "Repository: $REPO_NAME"
        echo "Tag: $PRIMARY_TAG"
        echo "Severity Threshold: $THRESHOLD"
        echo "Timeout: ${TIMEOUT}s"
        echo "::endgroup::"

        # Check if scanOnPush is enabled on the repository
        ECR_SCAN_ENABLED=$(aws ecr describe-repositories \
          --repository-names "$REPO_NAME" \
          --region "$REGION" \
          --query 'repositories[0].imageScanningConfiguration.scanOnPush' \
          --output text 2>/dev/null || echo "false")

        # If not enabled, trigger manual scan
        if [ "$ECR_SCAN_ENABLED" != "true" ] && [ "$ECR_SCAN_ENABLED" != "True" ]; then
          echo "scanOnPush not enabled, triggering manual scan..."
          aws ecr start-image-scan \
            --repository-name "$REPO_NAME" \
            --image-id imageTag="$PRIMARY_TAG" \
            --region "$REGION" || {
              echo "::warning::Failed to start image scan. Scan may already be in progress."
            }
        fi

        # Poll for scan completion
        POLL_INTERVAL=10
        ELAPSED=0

        echo "Waiting for scan to complete..."
        SCAN_STATUS="PENDING"
        while true; do
          # Check timeout before polling
          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            if [ "$FAIL_ON_TIMEOUT" = "true" ]; then
              echo "::error::Scan timed out after ${TIMEOUT}s"
              exit 1
            else
              echo "::warning::Scan timed out after ${TIMEOUT}s, continuing anyway"
              exit 0
            fi
          fi

          SCAN_STATUS=$(aws ecr describe-image-scan-findings \
            --repository-name "$REPO_NAME" \
            --image-id imageTag="$PRIMARY_TAG" \
            --region "$REGION" \
            --query 'imageScanStatus.status' \
            --output text 2>/dev/null || echo "PENDING")

          case "$SCAN_STATUS" in
            "COMPLETE")
              echo "Scan completed."
              break
              ;;
            "IN_PROGRESS"|"PENDING")
              echo "Scan status: $SCAN_STATUS (${ELAPSED}s elapsed)"
              sleep $POLL_INTERVAL
              ELAPSED=$((ELAPSED + POLL_INTERVAL))
              ;;
            "FAILED")
              echo "::error::ECR vulnerability scan failed"
              exit 1
              ;;
            "UNSUPPORTED_IMAGE")
              echo "::error::ECR basic scanning returned UNSUPPORTED_IMAGE for this image."
              echo "::error::If your account uses Amazon Inspector V2 enhanced scanning, ECR basic scan findings are not available via this API."
              echo "::error::Check Inspector V2 findings directly in the AWS console or via the Inspector API."
              exit 1
              ;;
            *)
              echo "Unknown scan status: $SCAN_STATUS"
              sleep $POLL_INTERVAL
              ELAPSED=$((ELAPSED + POLL_INTERVAL))
              ;;
          esac
        done

        # Fetch complete scan results
        SCAN_FINDINGS=$(aws ecr describe-image-scan-findings \
          --repository-name "$REPO_NAME" \
          --image-id imageTag="$PRIMARY_TAG" \
          --region "$REGION")

        # Extract counts by severity using jq
        CRITICAL=$(echo "$SCAN_FINDINGS" | jq -r '.imageScanFindings.findingSeverityCounts.CRITICAL // 0')
        HIGH=$(echo "$SCAN_FINDINGS" | jq -r '.imageScanFindings.findingSeverityCounts.HIGH // 0')
        MEDIUM=$(echo "$SCAN_FINDINGS" | jq -r '.imageScanFindings.findingSeverityCounts.MEDIUM // 0')
        LOW=$(echo "$SCAN_FINDINGS" | jq -r '.imageScanFindings.findingSeverityCounts.LOW // 0')
        INFORMATIONAL=$(echo "$SCAN_FINDINGS" | jq -r '.imageScanFindings.findingSeverityCounts.INFORMATIONAL // 0')

        # Display summary
        echo "::group::Vulnerability Scan Results"
        echo "CRITICAL: $CRITICAL | HIGH: $HIGH | MEDIUM: $MEDIUM | LOW: $LOW | INFORMATIONAL: $INFORMATIONAL"
        echo "::endgroup::"

        # Add to GitHub Step Summary
        {
          echo "### 🔍 Vulnerability Scan Results"
          echo ""
          echo "| Severity | Count |"
          echo "|----------|------:|"
          echo "| 🔴 Critical | $CRITICAL |"
          echo "| 🟠 High | $HIGH |"
          echo "| 🟡 Medium | $MEDIUM |"
          echo "| 🔵 Low | $LOW |"
          echo "| ⚪ Informational | $INFORMATIONAL |"
          echo ""
          echo "**Threshold:** $THRESHOLD"
        } >> "$GITHUB_STEP_SUMMARY"

        # Calculate failing count based on threshold
        case "$THRESHOLD" in
          "CRITICAL")
            FAILING_COUNT=$CRITICAL
            ;;
          "HIGH")
            FAILING_COUNT=$((CRITICAL + HIGH))
            ;;
          "MEDIUM")
            FAILING_COUNT=$((CRITICAL + HIGH + MEDIUM))
            ;;
          "LOW")
            FAILING_COUNT=$((CRITICAL + HIGH + MEDIUM + LOW))
            ;;
          "INFORMATIONAL")
            FAILING_COUNT=$((CRITICAL + HIGH + MEDIUM + LOW + INFORMATIONAL))
            ;;
          *)
            echo "::warning::Unknown severity threshold: $THRESHOLD, defaulting to CRITICAL"
            FAILING_COUNT=$CRITICAL
            ;;
        esac

        # Fail if threshold breached
        if [ "$FAILING_COUNT" -gt 0 ]; then
          echo "::error::Found $FAILING_COUNT vulnerabilities at or above $THRESHOLD severity"
          exit 1
        fi

        echo "✅ No vulnerabilities found at or above $THRESHOLD severity"
